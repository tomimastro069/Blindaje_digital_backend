version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: blindaje-postgres
    restart: always
    environment:
      POSTGRES_DB: blindaje
      POSTGRES_USER: blindaje
      POSTGRES_PASSWORD: blindaje
      TZ: America/Argentina/Buenos_Aires
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: blindaje-backend
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/blindaje
      SPRING_DATASOURCE_USERNAME: blindaje
      SPRING_DATASOURCE_PASSWORD: blindaje

volumes:
  postgres_data:
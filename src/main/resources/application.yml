spring:
  application:
    name: blindaje-digital

  datasource:
    url: jdbc:postgresql://postgres:5432/blindaje
    username: blindaje
    password: blindaje
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

server:
  port: 8080